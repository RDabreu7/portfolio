<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Render anexos</title>
<style>body{background:#222;margin:0;padding:20px;font:13px monospace;color:#9f9}canvas{display:block;width:612px;background:#fff;margin:0 0 20px}</style>
</head>
<body>
<div id="st">cargando…</div>
<canvas id="p4"></canvas>
<canvas id="p5"></canvas>
<script type="module">
import * as pdfjs from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.min.mjs';
pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.worker.min.mjs';
const st = document.getElementById('st');
try {
  const doc = await pdfjs.getDocument('../uploads/cv-anexos.pdf').promise;
  for (const n of [4, 5]) {
    const page = await doc.getPage(n);
    const vp = page.getViewport({ scale: 2.2 });
    const c = document.getElementById('p' + n);
    c.width = Math.round(vp.width); c.height = Math.round(vp.height);
    await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
    st.textContent = 'p' + n + ' listo';
  }
  st.textContent = 'LISTO';
} catch (e) { st.textContent = 'ERROR: ' + e.message; }
</script>
</body>
</html>
